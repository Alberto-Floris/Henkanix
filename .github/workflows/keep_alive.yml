name: Keep App Alive

on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - run: python keep_alive.py
        env:
          APP_URL: https://henkanix.streamlit.app/